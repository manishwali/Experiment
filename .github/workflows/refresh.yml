name: Refresh KPI Data

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 1 * * *'

jobs:
  refresh:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run KPI Pull Script
        shell: powershell
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
        run: |
          $PAT  = $env:ADO_PAT
          $ORG  = "aurigomasterworks"
          $OUTDIR = "$env:GITHUB_WORKSPACE"
          $DV_CAP_DAYS = 365

          $PROJECTS = @(
            "AI ML COE",
            "API_Integrations",
            "Aurigo Essentials 2.0",
            "Aurigo MW Modernization",
            "Aurigo Plan 2.0",
            "AurigoMasterworks",
            "MW Platform 2.0",
            "MWPRO_Configplus",
            "Mobile-NexGen-Aurigo-Build"
          )

          $PBI_OUT     = Join-Path $OUTDIR "KPI_PBIs.csv"
          $BUG_OUT     = Join-Path $OUTDIR "KPI_Bugs.csv"
          $FEATURE_OUT = Join-Path $OUTDIR "KPI_Features.csv"
          $SPRINT_OUT  = Join-Path $OUTDIR "KPI_Sprints.csv"

          $StartDate   = "2026-04-01"
          $EndDate     = (Get-Date).ToString("yyyy-MM-dd")
          $periodStart = [datetime]::ParseExact($StartDate, "yyyy-MM-dd", $null)
          $periodEnd   = [datetime]::ParseExact($EndDate,   "yyyy-MM-dd", $null)

          Write-Host "Date range: $StartDate to $EndDate"

          if ([string]::IsNullOrWhiteSpace($PAT)) {
            Write-Host "ERROR: ADO_PAT secret is empty."
            exit 1
          }

          foreach ($f in @($PBI_OUT, $BUG_OUT, $FEATURE_OUT, $SPRINT_OUT)) {
            if (Test-Path $f) { Remove-Item $f -Force; Write-Host "Deleted: $f" }
          }

          $base64 = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(":$PAT"))
          $headers = @{ Authorization = "Basic $base64"; "Content-Type" = "application/json" }

          Write-Host "Validating ADO PAT..."
          try {
            $testUrl  = "https://dev.azure.com/$ORG/_apis/projects?api-version=7.0"
            $testResp = Invoke-RestMethod -Uri $testUrl -Headers $headers -Method Get -ErrorAction Stop
            Write-Host "PAT valid - found $($testResp.count) projects"
          } catch {
            Write-Host "ERROR: PAT validation failed: $_"
            exit 1
          }

          function Format-Date($d) {
            if (-not $d) { return "" }
            try { return [datetime]::Parse($d.Substring(0,10)).ToString("dd-MMM-yyyy") } catch { return "" }
          }

          function Get-FieldValue($fields, $fieldName) {
            if ($fields.PSObject.Properties[$fieldName]) { return $fields.$fieldName }
            return ""
          }

          function Invoke-WiqlQuery($project, $wiql) {
            $enc  = [Uri]::EscapeDataString($project)
            $url  = "https://dev.azure.com/$ORG/$enc/_apis/wit/wiql?api-version=7.0"
            $body = @{ query = $wiql } | ConvertTo-Json
            try {
              $resp = Invoke-RestMethod -Uri $url -Headers $headers -Method Post -Body $body -ErrorAction Stop
              Write-Host "  $project -> $($resp.workItems.Count) items"
              return $resp.workItems
            } catch {
              $code = $_.Exception.Response.StatusCode.value__
              Write-Host "WIQL error $project (HTTP $code): $_"
              return @()
            }
          }

          function Get-WorkItemsBatch($ids) {
            if ($ids.Count -eq 0) { return @() }
            $results = [System.Collections.Generic.List[PSCustomObject]]::new()
            $fields  = "System.Id,System.Title,System.WorkItemType,System.TeamProject,System.State," +
                       "System.CreatedDate,System.IterationPath,System.Parent," +
                       "Microsoft.VSTS.Common.ClosedDate,Microsoft.VSTS.Scheduling.StoryPoints," +
                       "Custom.ValueAreas,Custom.CT_InProgress,Custom.DemoDate," +
                       "Custom.BV_Total_Score,Custom.BugsOrigin,Custom.T2FU_Days"
            for ($i = 0; $i -lt $ids.Count; $i += 200) {
              $batch = $ids[$i..([Math]::Min($i+199, $ids.Count-1))]
              $idStr = $batch -join ","
              $url   = "https://dev.azure.com/$ORG/_apis/wit/workitems?ids=$idStr&fields=$fields&api-version=7.0"
              try {
                $resp = Invoke-RestMethod -Uri $url -Headers $headers -Method Get -ErrorAction Stop
                foreach ($wi in $resp.value) { $results.Add($wi) }
              } catch { Write-Host "Batch error: $_" }
            }
            return $results
          }

          # ── SPRINTS ──────────────────────────────────────────────────────
          Write-Host "Pulling sprints..."
          $allSprints = [System.Collections.Generic.List[PSCustomObject]]::new()
          foreach ($proj in $PROJECTS) {
            $enc = [Uri]::EscapeDataString($proj)
            try {
              $url   = "https://dev.azure.com/$ORG/$enc/_apis/work/teamsettings/iterations?api-version=7.0"
              $resp  = Invoke-RestMethod -Uri $url -Headers $headers -Method Get -ErrorAction Stop
              $iters = $resp.value
            } catch { $iters = @() }
            foreach ($it in $iters) {
              $sd = $it.attributes.startDate
              $ed = $it.attributes.finishDate
              if (-not $sd) { continue }
              $sDt = try { [datetime]::Parse($sd.Substring(0,10)) } catch { $null }
              $eDt = if ($ed) { try { [datetime]::Parse($ed.Substring(0,10)) } catch { $null } } else { $null }
              if ($sDt -gt $periodEnd) { continue }
              if ($eDt -and $eDt -lt $periodStart) { continue }
              $month = if ($sDt) { $sDt.ToString("MMM-yy") } else { "" }
              $allSprints.Add([PSCustomObject]@{
                Project = $proj; IterationPath = $it.path; IterationName = $it.name
                StartDate = Format-Date $sd; EndDate = Format-Date $ed; Month = $month
              })
            }
          }
          $allSprints | Export-Csv -Path $SPRINT_OUT -NoTypeInformation -Encoding UTF8
          Write-Host "Sprints: $($allSprints.Count) rows"

          # ── PBIs ─────────────────────────────────────────────────────────
          Write-Host "Pulling PBIs..."
          $allPBIs = [System.Collections.Generic.List[PSCustomObject]]::new()
          foreach ($proj in $PROJECTS) {
            $q = "SELECT [System.Id] FROM WorkItems " +
                 "WHERE [System.TeamProject] = '$proj' " +
                 "AND [System.WorkItemType] IN ('Product Backlog Item','Architecture') " +
                 "AND [System.State] IN ('Closed','Done') " +
                 "AND [Microsoft.VSTS.Common.ClosedDate] >= '$StartDate' " +
                 "AND [Microsoft.VSTS.Common.ClosedDate] <= '$EndDate' " +
                 "ORDER BY [System.Id]"
            $refs = Invoke-WiqlQuery $proj $q
            if ($refs.Count -eq 0) { continue }
            $wis = Get-WorkItemsBatch ($refs | ForEach-Object { $_.id })
            foreach ($wi in $wis) {
              $f          = $wi.fields
              $closedDate = Get-FieldValue $f "Microsoft.VSTS.Common.ClosedDate"
              $createdDate= Get-FieldValue $f "System.CreatedDate"
              $ctDate     = Get-FieldValue $f "Custom.CT_InProgress"
              $closedDt   = if ($closedDate)  { try { [datetime]::Parse($closedDate.Substring(0,10))  } catch { $null } } else { $null }
              $createdDt  = if ($createdDate) { try { [datetime]::Parse($createdDate.Substring(0,10)) } catch { $null } } else { $null }
              $ctDt       = if ($ctDate)      { try { [datetime]::Parse($ctDate.Substring(0,10))      } catch { $null } } else { $null }
              $dvDays     = ""
              if ($ctDt -and $createdDt -and $ctDt -gt $createdDt) {
                $raw = ($ctDt - $createdDt).Days
                if ($raw -le $DV_CAP_DAYS) { $dvDays = $raw }
              }
              $month    = if ($closedDt) { $closedDt.ToString("MMM-yy") } else { "" }
              $parentId = Get-FieldValue $f "System.Parent"
              $va       = Get-FieldValue $f "Custom.ValueAreas"
              $sp       = Get-FieldValue $f "Microsoft.VSTS.Scheduling.StoryPoints"
              if (-not $sp) { $sp = 0 }
              $allPBIs.Add([PSCustomObject]@{
                ID = $wi.id; Title = Get-FieldValue $f "System.Title"
                WorkItemType = Get-FieldValue $f "System.WorkItemType"
                Project = Get-FieldValue $f "System.TeamProject"
                State = Get-FieldValue $f "System.State"; Month = $month
                CreatedDate = Format-Date $createdDate; ClosedDate = Format-Date $closedDate
                CT_InProgress = Format-Date $ctDate
                IterationPath = Get-FieldValue $f "System.IterationPath"
                ParentFeatureID = $parentId; HasParent = if ($parentId) { 1 } else { 0 }
                StoryPoints = $sp; ValueArea = $va
                IsArchitectural = if ($va -eq "Architectural") { 1 } else { 0 }
                DV_Days = $dvDays; Sprint_Readiness = if ($ctDate -and $ctDate -ne "") { 1 } else { 0 }
              })
            }
          }
          $allPBIs | Export-Csv -Path $PBI_OUT -NoTypeInformation -Encoding UTF8
          Write-Host "PBIs: $($allPBIs.Count) rows"

          # ── BUGS ─────────────────────────────────────────────────────────
          Write-Host "Pulling bugs..."
          $allBugs     = [System.Collections.Generic.List[PSCustomObject]]::new()
          $prodOrigins = @("Customer","Solution Engineering","Sustenance Engineering")
          foreach ($proj in $PROJECTS) {
            $q = "SELECT [System.Id] FROM WorkItems " +
                 "WHERE [System.TeamProject] = '$proj' " +
                 "AND [System.WorkItemType] = 'Bug' " +
                 "AND [System.CreatedDate] >= '$StartDate' " +
                 "AND [System.CreatedDate] <= '$EndDate' " +
                 "AND [System.State] NOT IN ('Deferred','Removed','Rejected') " +
                 "ORDER BY [System.Id]"
            $refs = Invoke-WiqlQuery $proj $q
            if ($refs.Count -eq 0) { continue }
            $ids  = $refs | ForEach-Object { $_.id }
            $bugFields = "System.Id,System.Title,System.TeamProject,System.State,System.CreatedDate,Custom.BugsOrigin"
            for ($i = 0; $i -lt $ids.Count; $i += 200) {
              $batch = $ids[$i..([Math]::Min($i+199,$ids.Count-1))]
              $idStr = $batch -join ","
              $url   = "https://dev.azure.com/$ORG/_apis/wit/workitems?ids=$idStr&fields=$bugFields&api-version=7.0"
              try {
                $resp = Invoke-RestMethod -Uri $url -Headers $headers -Method Get -ErrorAction Stop
                foreach ($wi in $resp.value) {
                  $f          = $wi.fields
                  $createdDate= Get-FieldValue $f "System.CreatedDate"
                  $bugOrigin  = Get-FieldValue $f "Custom.BugsOrigin"
                  $createdDt  = if ($createdDate) { try { [datetime]::Parse($createdDate.Substring(0,10)) } catch { $null } } else { $null }
                  $allBugs.Add([PSCustomObject]@{
                    ID = $wi.id; Title = Get-FieldValue $f "System.Title"
                    Project = Get-FieldValue $f "System.TeamProject"
                    State = Get-FieldValue $f "System.State"
                    Month = if ($createdDt) { $createdDt.ToString("MMM-yy") } else { "" }
                    CreatedDate = Format-Date $createdDate; BugOrigin = $bugOrigin
                    IsProduction = if ($prodOrigins -contains $bugOrigin) { 1 } else { 0 }
                  })
                }
              } catch { Write-Host "Bug batch error: $_" }
            }
          }
          $allBugs | Export-Csv -Path $BUG_OUT -NoTypeInformation -Encoding UTF8
          Write-Host "Bugs: $($allBugs.Count) rows"

          # ── FEATURES ─────────────────────────────────────────────────────
          Write-Host "Pulling features..."
          $allFeatures = [System.Collections.Generic.List[PSCustomObject]]::new()
          foreach ($proj in $PROJECTS) {
            $q = "SELECT [System.Id] FROM WorkItems " +
                 "WHERE [System.TeamProject] = '$proj' " +
                 "AND [System.WorkItemType] = 'Feature' " +
                 "AND [System.State] IN ('Closed','Done') " +
                 "AND [Microsoft.VSTS.Common.ClosedDate] >= '$StartDate' " +
                 "AND [Microsoft.VSTS.Common.ClosedDate] <= '$EndDate' " +
                 "ORDER BY [System.Id]"
            $refs = Invoke-WiqlQuery $proj $q
            if ($refs.Count -eq 0) { continue }
            $wis = Get-WorkItemsBatch ($refs | ForEach-Object { $_.id })
            foreach ($wi in $wis) {
              $f          = $wi.fields
              $demoDate   = Get-FieldValue $f "Custom.DemoDate"
              $closedDate = Get-FieldValue $f "Microsoft.VSTS.Common.ClosedDate"
              $demoDt     = if ($demoDate)   { try { [datetime]::Parse($demoDate.Substring(0,10))   } catch { $null } } else { $null }
              $closedDt   = if ($closedDate) { try { [datetime]::Parse($closedDate.Substring(0,10)) } catch { $null } } else { $null }
              $month      = if ($closedDt) { $closedDt.ToString("MMM-yy") } else { "" }
              $minCT = ""; $ttdDays = ""
              if ($demoDt) {
                $enc    = [Uri]::EscapeDataString($proj)
                $relUrl = "https://dev.azure.com/$ORG/$enc/_apis/wit/workitems/$($wi.id)?`$expand=relations&api-version=7.0"
                try {
                  $detail   = Invoke-RestMethod -Uri $relUrl -Headers $headers -Method Get -ErrorAction Stop
                  $childIds = @()
                  foreach ($rel in $detail.relations) {
                    if ($rel.rel -eq "System.LinkTypes.Hierarchy-Forward") { $childIds += $rel.url.Split("/")[-1] }
                  }
                  if ($childIds.Count -gt 0) {
                    $childWIs = Get-WorkItemsBatch $childIds
                    $cDates   = @()
                    foreach ($cw in $childWIs) {
                      $cd = Get-FieldValue $cw.fields "System.CreatedDate"
                      if ($cd) { try { $cDates += [datetime]::Parse($cd.Substring(0,10)) } catch {} }
                    }
                    if ($cDates.Count -gt 0) {
                      $minDt = ($cDates | Sort-Object)[0]
                      $minCT = $minDt.ToString("dd-MMM-yyyy")
                      if ($demoDt -gt $minDt) { $ttdDays = ($demoDt - $minDt).Days }
                    }
                  }
                } catch {}
              }
              $allFeatures.Add([PSCustomObject]@{
                ID = $wi.id; Title = Get-FieldValue $f "System.Title"
                Project = Get-FieldValue $f "System.TeamProject"
                State = Get-FieldValue $f "System.State"; Month = $month
                ClosedDate = Format-Date $closedDate; DemoDate = Format-Date $demoDate
                BV_Total_Score = Get-FieldValue $f "Custom.BV_Total_Score"
                Min_Child_CreatedDate = $minCT; TTD_Days = $ttdDays
                T2FU_Days = Get-FieldValue $f "Custom.T2FU_Days"
              })
            }
          }
          $allFeatures | Export-Csv -Path $FEATURE_OUT -NoTypeInformation -Encoding UTF8
          Write-Host "Features: $($allFeatures.Count) rows"
          Write-Host "Done."

      - name: Commit and push CSVs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add KPI_PBIs.csv KPI_Bugs.csv KPI_Features.csv KPI_Sprints.csv
          git diff --staged --quiet || git commit -m "Refresh KPI data 2026-04-01 to $(date '+%Y-%m-%d') - $(date '+%H:%M')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
